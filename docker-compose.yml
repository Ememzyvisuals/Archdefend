version: '3.9'

services:
  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: ../../infrastructure/docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://archdefend:archdefend@postgres:5432/archdefend
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /tmp/archdefend:/tmp/archdefend  # Temp clone workspace
    restart: unless-stopped
    networks:
      - archdefend-net

  # ── Worker (Dramatiq) ──────────────────────────────────────────────────────
  worker:
    build:
      context: ./apps/api
      dockerfile: ../../infrastructure/docker/Dockerfile.api
    command: dramatiq tasks --processes 4 --threads 2
    environment:
      - DATABASE_URL=postgresql+asyncpg://archdefend:archdefend@postgres:5432/archdefend
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /tmp/archdefend:/tmp/archdefend
    restart: unless-stopped
    networks:
      - archdefend-net

  # ── PostgreSQL + pgvector ──────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_DB=archdefend
      - POSTGRES_USER=archdefend
      - POSTGRES_PASSWORD=archdefend
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archdefend -d archdefend"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - archdefend-net

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - archdefend-net

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - archdefend-net

volumes:
  postgres_data:
  redis_data:

networks:
  archdefend-net:
    driver: bridge
